<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="Suraj Meruva — Explainable AI, Applied ML, Full-Stack Systems">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7FAFD"/>
      <stop offset="1" stop-color="#ECF2F8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.46" cy="0.38" r="0.62">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.83" cy="0.42" r="0.4">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.3"/></filter>
    <path id="wave" d="M60 262 H180 L196 260 L206 247 L214 280 L222 228 L230 284 L238 260 L252 262 H360 L376 260 L386 248 L394 278 L402 226 L410 282 L418 262 H560 L576 260 L586 247 L594 280 L602 228 L610 284 L618 260 L632 262 H820 L836 260 L846 248 L854 278 L862 226 L870 282 L878 262 H1040 L1056 260 L1066 247 L1074 280 L1082 228 L1090 284 L1098 260 L1110 262 H1140" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="300" rx="22" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="300" rx="22" fill="url(#glow2)"/>
  <rect x="1.25" y="1.25" width="1197.5" height="297.5" rx="21" fill="none" stroke="#D6E0EC" stroke-width="1.5"/>

  <g transform="translate(992 138)">
    <g>
      <ellipse rx="152" ry="58" fill="none" stroke="#0891B2" stroke-opacity="0.35" stroke-width="1.4" transform="rotate(-24)"/>
      <ellipse rx="116" ry="116" fill="none" stroke="#7C3AED" stroke-opacity="0.20" stroke-width="1.1"/>
      <ellipse rx="84" ry="40" fill="none" stroke="#0891B2" stroke-opacity="0.22" stroke-width="1" transform="rotate(28)"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="44s" repeatCount="indefinite"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
      <g transform="rotate(-24)">
        <circle cx="152" cy="0" r="6" fill="#0891B2" filter="url(#soft)"/>
        <circle cx="152" cy="0" r="2.6" fill="#0E7490"/>
      </g>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="26s" repeatCount="indefinite"/>
      <circle cx="84" cy="0" r="3.4" fill="#7C3AED" transform="rotate(28)"/>
    </g>
    <circle r="9" fill="url(#acc)"/>
    <circle r="9" fill="none" stroke="#0891B2">
      <animate attributeName="r" values="9;30;9" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.6;0;0.6" dur="3.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <use href="#wave" stroke="#CBD9E6" stroke-width="2"/>
  <use href="#wave" stroke="url(#acc)" stroke-opacity="0.3" stroke-width="2"/>
  <use href="#wave" stroke="url(#acc)" stroke-width="2.7" filter="url(#blur)" stroke-dasharray="22 1700">
    <animate attributeName="stroke-dashoffset" from="1722" to="22" dur="3.4s" repeatCount="indefinite"/>
  </use>
  <use href="#wave" stroke="#0E7490" stroke-width="2.2" stroke-dasharray="14 1700">
    <animate attributeName="stroke-dashoffset" from="1714" to="14" dur="3.4s" repeatCount="indefinite"/>
  </use>

  <g>
    <text x="68" y="120" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="67" font-weight="800" letter-spacing="4" fill="#0E1B2E">SURAJ MERUVA</text>
    <text x="71" y="157" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700" letter-spacing="5.5" fill="#0E7490">EXPLAINABLE AI  ·  APPLIED ML  ·  FULL-STACK SYSTEMS</text>
    <text x="71" y="197" font-family="'JetBrains Mono','Courier New',monospace" font-size="17.5" fill="#46586E">&gt; I don't ship black boxes.<tspan fill="#0891B2"> &#9611;<animate attributeName="fill-opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite"/></tspan></text>
  </g>

  <g font-family="'JetBrains Mono','Courier New',monospace" font-size="12.5" font-weight="600">
    <g transform="translate(71 218)">
      <rect x="0" y="0" width="270" height="26" rx="13" fill="#FFFFFF" stroke="#0891B2" stroke-opacity="0.55"/>
      <circle cx="17" cy="13" r="4.5" fill="#059669">
        <animate attributeName="fill-opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="30" y="17" fill="#33485E" letter-spacing="1">OPEN TO AI / ML INTERNSHIPS</text>
    </g>
    <g transform="translate(353 218)">
      <rect x="0" y="0" width="186" height="26" rx="13" fill="#FFFFFF" stroke="#7C3AED" stroke-opacity="0.5"/>
      <circle cx="17" cy="13" r="4.5" fill="#7C3AED">
        <animate attributeName="fill-opacity" values="1;0.3;1" dur="1.6s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <text x="30" y="17" fill="#33485E" letter-spacing="1">BUILDING IN PUBLIC</text>
    </g>
  </g>
</svg>
