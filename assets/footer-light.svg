<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="1200" height="160" fill="none" role="img" aria-label="Let's build AI that explains itself">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7FAFD"/>
      <stop offset="1" stop-color="#ECF2F8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0891B2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0891B2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="b"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>

  <rect x="0" y="0" width="1200" height="160" rx="22" fill="url(#bg)"/>
  <rect x="1.25" y="1.25" width="1197.5" height="157.5" rx="21" fill="none" stroke="#D6E0EC" stroke-width="1.5"/>

  <rect x="80" y="92" width="1040" height="1.6" fill="url(#line)"/>
  <g>
    <circle cx="80" cy="92.8" r="3.5" fill="#0891B2" filter="url(#b)"/>
    <circle cx="80" cy="92.8" r="2" fill="#0E7490"/>
    <animateMotion dur="4.5s" repeatCount="indefinite" path="M0 0 H1040"/>
  </g>

  <text x="600" y="66" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="25" font-weight="700" letter-spacing="3" fill="url(#acc)">LET'S BUILD AI THAT EXPLAINS ITSELF</text>
  <text x="600" y="128" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace" font-size="13" letter-spacing="3.5" fill="#5A6B80">// thanks for orbiting by &#183; github.com/surajmeruva0786</text>

  <circle cx="600" cy="92.8" r="5" fill="none" stroke="#7C3AED" stroke-opacity="0.55">
    <animate attributeName="r" values="5;16;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.55;0;0.55" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
